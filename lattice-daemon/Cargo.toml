[package]
name = "lattice-daemon"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
directories = "5"
ed25519-dalek = "2"
jsonrpsee = { version = "0.24", features = ["server"] }
lattice-site = { path = "../lattice-site" }
libp2p = { version = "0.56", features = ["tokio", "tcp", "quic", "noise", "yamux", "kad", "mdns", "gossipsub", "macros", "identify"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
toml = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
