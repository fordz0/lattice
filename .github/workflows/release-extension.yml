name: Release Extension

on:
  push:
    tags:
      - "lattice-ext-v*"
  workflow_dispatch:
    inputs:
      browser:
        description: Browser build target
        required: false
        default: firefox
        type: choice
        options:
          - firefox
          - chrome
          - both
      sign_firefox:
        description: Sign Firefox builds with AMO when credentials are available
        required: false
        default: false
        type: boolean
      amo_channel_override:
        description: Override the AMO signing channel for this manual run
        required: false
        default: default
        type: choice
        options:
          - default
          - listed
          - unlisted
      attach_signed_xpi_to_release:
        description: When an unlisted Firefox XPI is produced, attach it to lattice-ext-v<version>
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
      AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
      CHROME_EXTENSION_KEY: ${{ secrets.CHROME_EXTENSION_KEY }}

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Resolve extension version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          manifest_version="$(python3 - <<'PY'
          import json
          with open('lattice-ext/manifest.json', 'r', encoding='utf-8') as handle:
              print(json.load(handle)['version'])
          PY
          )"
          release_mode=false
          version="$manifest_version"

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            release_mode=true
            version="${GITHUB_REF_NAME#lattice-ext-v}"
          fi

          {
            echo "manifest=$manifest_version"
            echo "release_mode=$release_mode"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Verify tag matches manifest version
        if: ${{ steps.version.outputs.release_mode == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${{ steps.version.outputs.version }}"
          manifest_version="${{ steps.version.outputs.manifest }}"
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "tag version ($tag_version) does not match lattice-ext/manifest.json ($manifest_version)" >&2
            exit 1
          fi

      - name: Run extension tests
        run: ./scripts/test_extension.sh

      - name: Lint extension
        run: npx --yes web-ext@8 lint --source-dir lattice-ext

      - name: Resolve browser targets
        id: targets
        shell: bash
        run: |
          set -euo pipefail
          selected="both"
          sign_firefox=false
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            selected="${{ github.event.inputs.browser }}"
            if [ "${{ github.event.inputs.sign_firefox }}" = "true" ]; then
              sign_firefox=true
            fi
          else
            sign_firefox=true
          fi

          firefox=false
          chrome=false

          case "$selected" in
            firefox)
              firefox=true
              ;;
            chrome)
              chrome=true
              ;;
            both)
              firefox=true
              chrome=true
              ;;
            *)
              echo "unsupported browser target: $selected" >&2
              exit 1
              ;;
          esac

          {
            echo "selected=$selected"
            echo "firefox=$firefox"
            echo "chrome=$chrome"
            echo "sign_firefox=$sign_firefox"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve AMO channel
        id: amo
        shell: bash
        env:
          AMO_CHANNEL: ${{ vars.AMO_CHANNEL }}
        run: |
          set -euo pipefail
          channel="${AMO_CHANNEL:-listed}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            override="${{ github.event.inputs.amo_channel_override }}"
            if [ "$override" != "default" ]; then
              channel="$override"
            fi
          fi
          listed=false
          if [ "$channel" = "listed" ]; then
            listed=true
          fi
          {
            echo "channel=$channel"
            echo "listed=$listed"
          } >> "$GITHUB_OUTPUT"

      - name: Build extension package(s)
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          mkdir -p release-assets

          if [ "${{ steps.targets.outputs.firefox }}" = "true" ]; then
            python3 scripts/build_extension.py \
              --browser firefox \
              --version "$version" \
              --out-dir release-assets
          fi

          if [ "${{ steps.targets.outputs.chrome }}" = "true" ]; then
            python3 scripts/build_extension.py \
              --browser chrome \
              --version "$version" \
              --out-dir release-assets
          fi

      - name: Build Chrome CRX
        if: ${{ steps.targets.outputs.chrome == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          key_path=""
          if [ -n "${CHROME_EXTENSION_KEY:-}" ]; then
            key_path="$(mktemp)"
            printf '%s\n' "$CHROME_EXTENSION_KEY" > "$key_path"
          fi

          if [ -n "$key_path" ]; then
            ./scripts/build_chrome_crx.sh \
              "release-assets/lattice-extension-chrome-${version}.zip" \
              "$version" \
              "release-assets" \
              "$key_path"
          else
            ./scripts/build_chrome_crx.sh \
              "release-assets/lattice-extension-chrome-${version}.zip" \
              "$version" \
              "release-assets"
          fi

      - name: Sign extension with AMO
        if: ${{ steps.targets.outputs.firefox == 'true' && steps.targets.outputs.sign_firefox == 'true' && env.AMO_JWT_ISSUER != '' && env.AMO_JWT_SECRET != '' }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          channel="${{ steps.amo.outputs.channel }}"
          mkdir -p release-assets/signed
          sign_log="$(mktemp)"
          set +e
          npx --yes web-ext@8 sign \
            --source-dir lattice-ext \
            --artifacts-dir release-assets/signed \
            --channel "$channel" \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET" \
            >"$sign_log" 2>&1
          sign_status=$?
          set -e
          cat "$sign_log"
          if [ "$sign_status" -ne 0 ]; then
            if grep -Eq 'Version .* already exists|Submission failed .*Conflict' "$sign_log"; then
              echo "AMO already has extension version ${version}; continuing without a new signed artifact."
              exit 0
            fi
            exit "$sign_status"
          fi
          signed_xpi="$(find release-assets/signed -maxdepth 1 -type f -name '*.xpi' -print -quit)"
          if [ -z "$signed_xpi" ]; then
            if [ "$channel" = "listed" ]; then
              echo "AMO listed submission completed; no self-distribution .xpi artifact was produced."
              exit 0
            fi
            echo "web-ext sign did not produce a signed .xpi" >&2
            exit 1
          fi
          mv "$signed_xpi" "release-assets/lattice-extension-${version}.xpi"

      - name: Upload workflow artifacts
        if: ${{ steps.version.outputs.release_mode != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: lattice-extension-${{ steps.targets.outputs.selected }}-${{ steps.version.outputs.version }}
          path: release-assets/*
          if-no-files-found: error

      - name: Attach signed XPI to tagged release
        if: ${{ steps.version.outputs.release_mode != 'true' && github.event.inputs.attach_signed_xpi_to_release == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          tag="lattice-ext-v${version}"
          xpi="release-assets/lattice-extension-${version}.xpi"

          if [ ! -f "$xpi" ]; then
            echo "No signed XPI was produced; nothing to attach." >&2
            exit 1
          fi

          gh release view "$tag" >/dev/null 2>&1
          gh release upload "$tag" "$xpi" --clobber

      - name: Publish release
        if: ${{ steps.version.outputs.release_mode == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          cat > release-notes.md <<'EOF'
          Browser extension release for Lattice.

          Preferred Firefox install path:
          - public AMO listing: https://addons.mozilla.org/en-US/firefox/addon/lattice/

          GitHub release assets:
          - `lattice-extension-<version>.xpi` is attached only for AMO `unlisted` self-distribution builds
          - `lattice-extension-firefox-<version>.zip` is the Firefox-targeted packaged source artifact
          - `lattice-extension-chrome-<version>.zip` is a Chromium-targeted package preview
          - `lattice-extension-chrome-<version>.crx` is a Chromium test install artifact; stable extension identity needs a persistent signing key

          Before browsing `.loom` sites:

          ```bash
          lattice up
          lattice doctor
          ```
          EOF

          assets=(
          )

          if [ -f "release-assets/lattice-extension-firefox-${version}.zip" ]; then
            assets+=("release-assets/lattice-extension-firefox-${version}.zip")
          fi

          if [ -f "release-assets/lattice-extension-chrome-${version}.zip" ]; then
            assets+=("release-assets/lattice-extension-chrome-${version}.zip")
          fi

          if [ -f "release-assets/lattice-extension-chrome-${version}.crx" ]; then
            assets+=("release-assets/lattice-extension-chrome-${version}.crx")
          fi

          if [ -f "release-assets/lattice-extension-${version}.xpi" ]; then
            assets+=("release-assets/lattice-extension-${version}.xpi")
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "$GITHUB_REF_NAME" \
              --verify-tag \
              --generate-notes \
              --notes-file release-notes.md
          fi
