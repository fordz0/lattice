name: Release Fray

on:
  push:
    tags:
      - "fray-v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: fray-linux-x86_64
            build_cmd: cargo build --release -p fray --target x86_64-unknown-linux-gnu
            artifact_path: target/x86_64-unknown-linux-gnu/release/fray
            install_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: fray-linux-aarch64
            build_cmd: cross build --release -p fray --target aarch64-unknown-linux-gnu
            artifact_path: target/aarch64-unknown-linux-gnu/release/fray
            install_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: fray-macos-x86_64
            build_cmd: cargo build --release -p fray --target x86_64-apple-darwin
            artifact_path: target/x86_64-apple-darwin/release/fray
            install_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: fray-macos-aarch64
            build_cmd: cargo build --release -p fray --target aarch64-apple-darwin
            artifact_path: target/aarch64-apple-darwin/release/fray
            install_cross: false

    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_DIR: target/${{ matrix.binary_name }}

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Install cross
        if: matrix.install_cross
        run: cargo install cross --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> ${{ env.CARGO_TARGET_DIR }}

      - name: Build Fray
        run: ${{ matrix.build_cmd }}

      - name: Package binary
        shell: bash
        run: |
          cp "$CARGO_TARGET_DIR/${{ matrix.target }}/release/fray" "${{ matrix.binary_name }}"
          chmod +x "${{ matrix.binary_name }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.binary_name }}" | awk '{print $1}' > "${{ matrix.binary_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.binary_name }}" | awk '{print $1}' > "${{ matrix.binary_name }}.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.binary_name }}
          path: |
            ${{ matrix.binary_name }}
            ${{ matrix.binary_name }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cat > release-notes.md <<'EOF'
          Fray release binaries are attached below for Linux and macOS.

          Fray expects a local Lattice node:

          ```bash
          lattice up
          fray
          ```

          GitHub Releases now exposes SHA256 digests for uploaded assets directly in
          the release UI and API.
          EOF

          shopt -s nullglob
          assets=(
            release-assets/*/fray-linux-x86_64
            release-assets/*/fray-linux-aarch64
            release-assets/*/fray-macos-x86_64
            release-assets/*/fray-macos-aarch64
          )

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "$GITHUB_REF_NAME" \
              --verify-tag \
              --generate-notes \
              --notes-file release-notes.md
          fi
