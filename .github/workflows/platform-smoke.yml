name: Platform Smoke

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run lattice smoke tests
        run: cargo test -p lattice -p lattice-daemon

      - name: Check CLI help
        run: cargo run -p lattice -- --help

      - name: Check service status command
        run: cargo run -p lattice -- service status

      - name: Check doctor command
        run: cargo run -p lattice -- doctor --json

      - name: Start daemon and check status (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p lattice-daemon -- \
            --rpc-port 17880 \
            --http-port 17881 \
            --https-port 17443 \
            --proxy-port 17882 \
            >daemon.log 2>&1 &
          daemon_pid=$!
          trap 'kill "$daemon_pid" || true' EXIT
          for _ in $(seq 1 30); do
            if cargo run -p lattice -- --rpc-port 17880 status >/tmp/lattice-status.txt 2>&1; then
              cat /tmp/lattice-status.txt
              cargo run -p lattice -- --rpc-port 17880 doctor --json
              exit 0
            fi
            sleep 1
          done
          cat daemon.log
          exit 1

      - name: Start daemon and check status (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $proc = Start-Process cargo -ArgumentList @(
            'run','-p','lattice-daemon','--',
            '--rpc-port','17880',
            '--http-port','17881',
            '--https-port','17443',
            '--proxy-port','17882'
          ) -RedirectStandardOutput daemon.log -RedirectStandardError daemon.log -PassThru
          try {
            for ($i = 0; $i -lt 30; $i++) {
              cargo run -p lattice -- --rpc-port 17880 status *> status.log
              if ($LASTEXITCODE -eq 0) {
                Get-Content status.log
                cargo run -p lattice -- --rpc-port 17880 doctor --json
                exit 0
              }
              Start-Sleep -Seconds 1
            }
            Get-Content daemon.log
            exit 1
          }
          finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Install WiX (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: dotnet tool install --global wix --version 4.*

      - name: Build and validate MSI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          $stageDir = "dist/lattice-windows-smoke"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item "target/debug/lattice.exe" "$stageDir/lattice.exe"
          Copy-Item "target/debug/lattice-daemon.exe" "$stageDir/lattice-daemon.exe"
          Copy-Item "LICENSE" "$stageDir/LICENSE"
          Copy-Item "README.md" "$stageDir/README.md"
          pwsh ./packaging/windows/msi/build-msi.ps1 `
            -SourceDir $stageDir `
            -Version "0.1.99" `
            -OutputPath "lattice-windows-smoke.msi"
          pwsh ./packaging/windows/msi/Test-Msi.ps1 `
            -Path "lattice-windows-smoke.msi" `
            -ExpectedVersion "0.1.99"
