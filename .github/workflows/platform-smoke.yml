name: Platform Smoke

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run lattice smoke tests
        run: cargo test -p lattice -p lattice-daemon

      - name: Check CLI help
        run: cargo run -p lattice -- --help
