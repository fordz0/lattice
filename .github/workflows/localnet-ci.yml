name: Localnet Stress

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  localnet:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release -p lattice-daemon -p lattice -p lattice-site

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Dependency audit
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2025-0057 \
            --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2024-0436

      - name: Run extension smoke tests
        run: ./scripts/test_extension.sh

      - name: Run localnet stress (range + restart)
        env:
          LATTICE_STRESS_NODES: "4"
          LATTICE_STRESS_ROUNDS: "1"
          LATTICE_STRESS_NAME: "stress-${{ github.run_id }}-${{ github.run_attempt }}"
          LATTICE_STRESS_RESET_LOCALNET: "1"
          LATTICE_STRESS_ASSET_FILES: "12"
          LATTICE_STRESS_ASSET_BYTES: "4096"
          LATTICE_STRESS_VIDEO_BYTES: "524288"
          LATTICE_STRESS_RANGE_CHECK: "1"
          LATTICE_STRESS_RESTART_CHECK: "1"
          RUST_LOG: "warn"
        run: ./scripts/localnet_stress.sh run
