name: Release Lattice

on:
  push:
    tags:
      - "lattice-v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_stem: lattice-linux-x86_64
            archive_name: lattice-linux-x86_64.tar.gz
            build_cmd: cargo build --release --locked -p lattice -p lattice-daemon --target x86_64-unknown-linux-gnu
            install_cross: false
            is_windows: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_stem: lattice-linux-aarch64
            archive_name: lattice-linux-aarch64.tar.gz
            build_cmd: cross build --release --locked -p lattice -p lattice-daemon --target aarch64-unknown-linux-gnu
            install_cross: true
            is_windows: false
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact_stem: lattice-macos-x86_64
            archive_name: lattice-macos-x86_64.tar.gz
            build_cmd: cargo build --release --locked -p lattice -p lattice-daemon --target x86_64-apple-darwin
            install_cross: false
            is_windows: false
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_stem: lattice-macos-aarch64
            archive_name: lattice-macos-aarch64.tar.gz
            build_cmd: cargo build --release --locked -p lattice -p lattice-daemon --target aarch64-apple-darwin
            install_cross: false
            is_windows: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_stem: lattice-windows-x86_64
            archive_name: lattice-windows-x86_64.zip
            msi_name: lattice-windows-x86_64.msi
            build_cmd: cargo build --release --locked -p lattice -p lattice-daemon --target x86_64-pc-windows-msvc
            install_cross: false
            is_windows: true

    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_DIR: target/${{ matrix.artifact_stem }}

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> ${{ env.CARGO_TARGET_DIR }}

      - name: Install cross
        if: matrix.install_cross
        run: cargo install cross --locked

      - name: Build Lattice binaries
        run: ${{ matrix.build_cmd }}

      - name: Package Unix release
        if: ${{ !matrix.is_windows }}
        shell: bash
        run: |
          set -euo pipefail
          stage_dir="dist/${{ matrix.artifact_stem }}"
          mkdir -p "$stage_dir"
          cp "$CARGO_TARGET_DIR/${{ matrix.target }}/release/lattice" "$stage_dir/lattice"
          cp "$CARGO_TARGET_DIR/${{ matrix.target }}/release/lattice-daemon" "$stage_dir/lattice-daemon"
          cp LICENSE "$stage_dir/LICENSE"
          cp README.md "$stage_dir/README.md"
          chmod +x "$stage_dir/lattice" "$stage_dir/lattice-daemon"
          tar -C dist -czf "${{ matrix.archive_name }}" "${{ matrix.artifact_stem }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.archive_name }}" | awk '{print $1}' > "${{ matrix.archive_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.archive_name }}" | awk '{print $1}' > "${{ matrix.archive_name }}.sha256"
          fi

      - name: Package Windows release
        if: ${{ matrix.is_windows }}
        shell: pwsh
        run: |
          $stageDir = "dist/${{ matrix.artifact_stem }}"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item "$env:CARGO_TARGET_DIR/${{ matrix.target }}/release/lattice.exe" "$stageDir/lattice.exe"
          Copy-Item "$env:CARGO_TARGET_DIR/${{ matrix.target }}/release/lattice-daemon.exe" "$stageDir/lattice-daemon.exe"
          Copy-Item "LICENSE" "$stageDir/LICENSE"
          Copy-Item "README.md" "$stageDir/README.md"
          Compress-Archive -Path "$stageDir/*" -DestinationPath "${{ matrix.archive_name }}" -Force
          $hash = (Get-FileHash "${{ matrix.archive_name }}" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "${{ matrix.archive_name }}.sha256" -Value $hash -NoNewline

      - name: Install WiX
        if: ${{ matrix.is_windows }}
        shell: pwsh
        run: dotnet tool install --global wix --version 4.*

      - name: Build Windows MSI
        if: ${{ matrix.is_windows }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "${{ github.ref_name }}" -replace '^lattice-v', ''
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          & ./packaging/windows/msi/build-msi.ps1 `
            -SourceDir "dist/${{ matrix.artifact_stem }}" `
            -Version $version `
            -OutputPath "${{ matrix.msi_name }}"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $hash = (Get-FileHash "${{ matrix.msi_name }}" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "${{ matrix.msi_name }}.sha256" -Value $hash -NoNewline

      - name: Validate Windows MSI
        if: ${{ matrix.is_windows }}
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^lattice-v', ''
          cscript.exe //NoLogo ./packaging/windows/msi/Test-Msi.vbs `
            "${{ matrix.msi_name }}" `
            $version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Unix artifacts
        if: ${{ !matrix.is_windows }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_stem }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256

      - name: Upload Windows artifacts
        if: ${{ matrix.is_windows }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_stem }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256
            ${{ matrix.msi_name }}
            ${{ matrix.msi_name }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate Homebrew formula
        run: |
          version="${GITHUB_REF_NAME#lattice-v}"
          python3 packaging/homebrew/lattice-net/render_formula.py \
            --version "$version" \
            --macos-x86-sha256 release-assets/lattice-macos-x86_64/lattice-macos-x86_64.tar.gz.sha256 \
            --macos-arm64-sha256 release-assets/lattice-macos-aarch64/lattice-macos-aarch64.tar.gz.sha256 \
            --output release-assets/homebrew/lattice-net.rb

      - name: Generate Debian packages and APT repo snapshot
        run: |
          version="${GITHUB_REF_NAME#lattice-v}"
          python3 packaging/apt/build_repo.py \
            --version "$version" \
            --amd64-tarball release-assets/lattice-linux-x86_64/lattice-linux-x86_64.tar.gz \
            --arm64-tarball release-assets/lattice-linux-aarch64/lattice-linux-aarch64.tar.gz \
            --output-dir release-assets/apt

      - name: Write package checksums
        run: |
          sha256sum release-assets/apt/*.deb release-assets/apt/lattice-apt-repo.tar.gz \
            | while read -r hash path; do
                printf '%s' "$hash" > "${path}.sha256"
              done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Quick install

            - Arch Linux: `yay -S lattice-net-git`
            - Windows: download and run `lattice-windows-x86_64.msi`
            - Debian/Ubuntu: download the matching `.deb` package from this release
            - macOS Apple Silicon: `lattice-macos-aarch64.tar.gz`
            - macOS Intel: `lattice-macos-x86_64.tar.gz`
            - Linux x86_64: `lattice-linux-x86_64.tar.gz`
            - Linux aarch64: `lattice-linux-aarch64.tar.gz`

            Additional packaging assets are attached too:
            - `lattice-net.rb` for a Homebrew tap
            - `.deb` packages for `amd64` and `arm64`
            - `lattice-apt-repo.tar.gz` as an APT repo snapshot

            After installing, bring the node online with:

            ```bash
            lattice up
            lattice doctor
            ```

            Checksums for every artifact are attached alongside the release assets.

          generate_release_notes: true
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.tar.gz.sha256
            release-assets/**/*.zip
            release-assets/**/*.zip.sha256
            release-assets/**/*.msi
            release-assets/**/*.msi.sha256
            release-assets/**/*.deb
            release-assets/**/*.deb.sha256
            release-assets/**/lattice-net.rb

  publish-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate Homebrew formula
        run: |
          version="${GITHUB_REF_NAME#lattice-v}"
          python3 packaging/homebrew/lattice-net/render_formula.py \
            --version "$version" \
            --macos-x86-sha256 release-assets/lattice-macos-x86_64/lattice-macos-x86_64.tar.gz.sha256 \
            --macos-arm64-sha256 release-assets/lattice-macos-aarch64/lattice-macos-aarch64.tar.gz.sha256 \
            --output release-assets/homebrew/lattice-net.rb

      - name: Publish formula to Homebrew tap
        env:
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          PACKAGING_PUSH_TOKEN: ${{ secrets.PACKAGING_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_REPO:-}" ] || [ -z "${PACKAGING_PUSH_TOKEN:-}" ]; then
            echo "Skipping Homebrew tap publish; HOMEBREW_TAP_REPO or PACKAGING_PUSH_TOKEN is not configured."
            exit 0
          fi

          workdir="$(mktemp -d)"
          repo_url="https://x-access-token:${PACKAGING_PUSH_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git"
          git clone "$repo_url" "$workdir/tap"
          cp release-assets/homebrew/lattice-net.rb "$workdir/tap/Formula/lattice-net.rb"

          cd "$workdir/tap"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/lattice-net.rb; then
            echo "Homebrew formula already up to date."
            exit 0
          fi

          git add Formula/lattice-net.rb
          git commit -m "Update lattice-net formula for ${GITHUB_REF_NAME}"
          git push

  publish-apt-repo:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate Debian packages and APT repo snapshot
        run: |
          version="${GITHUB_REF_NAME#lattice-v}"
          python3 packaging/apt/build_repo.py \
            --version "$version" \
            --amd64-tarball release-assets/lattice-linux-x86_64/lattice-linux-x86_64.tar.gz \
            --arm64-tarball release-assets/lattice-linux-aarch64/lattice-linux-aarch64.tar.gz \
            --output-dir release-assets/apt

      - name: Publish APT repo snapshot
        env:
          APT_REPO_TARGET: ${{ vars.APT_REPO_TARGET }}
          APT_REPO_BRANCH: ${{ vars.APT_REPO_BRANCH }}
          APT_REPO_SUBDIR: ${{ vars.APT_REPO_SUBDIR }}
          PACKAGING_PUSH_TOKEN: ${{ secrets.PACKAGING_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${APT_REPO_TARGET:-}" ] || [ -z "${PACKAGING_PUSH_TOKEN:-}" ]; then
            echo "Skipping APT publish; APT_REPO_TARGET or PACKAGING_PUSH_TOKEN is not configured."
            exit 0
          fi

          branch="${APT_REPO_BRANCH:-gh-pages}"
          subdir="${APT_REPO_SUBDIR:-apt}"
          workdir="$(mktemp -d)"
          repo_url="https://x-access-token:${PACKAGING_PUSH_TOKEN}@github.com/${APT_REPO_TARGET}.git"

          if git ls-remote --exit-code --heads "$repo_url" "$branch" >/dev/null 2>&1; then
            git clone --branch "$branch" --single-branch "$repo_url" "$workdir/repo"
          else
            git clone "$repo_url" "$workdir/repo"
            cd "$workdir/repo"
            git checkout --orphan "$branch"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

          mkdir -p "$workdir/repo/$subdir"
          find "$workdir/repo/$subdir" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf release-assets/apt/lattice-apt-repo.tar.gz \
            -C "$workdir/repo/$subdir" \
            --strip-components=1

          cd "$workdir/repo"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "$subdir"; then
            echo "APT repo snapshot already up to date."
            exit 0
          fi

          git add "$subdir"
          git commit -m "Publish APT repo for ${GITHUB_REF_NAME}"
          git push origin "$branch"
