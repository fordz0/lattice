<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lattice</title>
  <style>
    body {
      margin: 0;
      padding: 14px;
      width: 320px;
      font: 13px/1.4 system-ui, sans-serif;
      color: #18212a;
      background: linear-gradient(180deg, #f5f7fa 0%, #eef2f5 100%);
    }

    #card {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(24, 33, 42, 0.08);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(24, 33, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    p {
      margin: 0 0 8px;
    }

    dl {
      margin: 0 0 12px;
    }

    dt {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #5f6b76;
      margin-top: 8px;
    }

    dd {
      margin: 2px 0 0;
      word-break: break-word;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: #0b6f3c;
    }

    button.secondary {
      background: #45525f;
    }

    button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    #status {
      color: #5f6b76;
      margin-bottom: 10px;
    }

    #error {
      color: #8b1e00;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="card">
    <h1>Lattice Site Trust</h1>
    <div id="content">
      <p id="status">Loading…</p>
    </div>
    <p id="error"></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
